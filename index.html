<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff3900" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Ping Pong Club</title>
  </head>
  <body>
    <script>
      // Apply theme before first paint to prevent flash
      (function(){var t=localStorage.getItem('pingpong_theme')||'light';var d=t==='auto'?window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light':t;document.documentElement.setAttribute('data-theme',d)})();
    </script>
    <div id="root"></div>
    <script>
      // One-time SW cache buster: unregister old SW and clear caches before loading app
      (function(){
        function loadApp() {
          var s = document.createElement('script');
          s.type = 'module';
          s.src = '/src/main.jsx';
          document.body.appendChild(s);
        }
        if (!navigator.serviceWorker) { loadApp(); return; }
        var key = 'sw_cache_busted_v3';
        if (localStorage.getItem(key)) { loadApp(); return; }
        navigator.serviceWorker.getRegistration().then(function(reg) {
          if (!reg) { localStorage.setItem(key, '1'); loadApp(); return; }
          reg.unregister().then(function() {
            return caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            });
          }).then(function() {
            localStorage.setItem(key, '1');
            window.location.reload();
          });
        });
      })();
    </script>
  </body>
</html>
